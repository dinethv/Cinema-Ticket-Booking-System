services:
  frontend:
    build:
      context: ./frontend
    container_name: cinema-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./backend
    container_name: cinema-api
    environment:
      PORT: ${PORT:-8000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/cinema}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cinema.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-before-prod}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: cinema-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: